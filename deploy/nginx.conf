# StreetCapture — production reverse proxy.
#
# Terminates TLS and proxies everything to the uvicorn app server (which serves
# both the API and the built SPA). The one thing that matters for the live view:
# proxy_buffering MUST be off on /api/stream, or nginx buffers the MJPEG stream
# and the video never appears.
#
# Usage: put your certs in place, set server_name, then `nginx -s reload`.
# For a quick public POC without nginx, just use ngrok (see README).

upstream streetcapture {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name your.domain.com;
    # For real deployments, redirect to HTTPS and add a TLS server block:
    # return 301 https://$host$request_uri;

    client_max_body_size 8m;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Live MJPEG stream — no buffering, long read timeout, keep it flowing.
    location /api/stream {
        proxy_pass http://streetcapture;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # API + SPA (index.html fallback is handled by the app).
    location / {
        proxy_pass http://streetcapture;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
